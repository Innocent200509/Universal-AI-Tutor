<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - AI Tutor Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            max-width: 500px;
            margin: 20px;
        }
        .checkmark {
            font-size: 80px;
            animation: bounce 0.5s ease;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        h1 { font-size: 2rem; margin: 20px 0; }
        .btn {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 20px;
            font-weight: bold;
        }
        .btn:hover {
            background: #059669;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">✅</div>
        <h1>Payment Successful!</h1>
        <p>You are now an <strong>AI Tutor Pro</strong> member!</p>
        <p>Your account has been upgraded with unlimited access to all subjects.</p>
        <p>You can now ask unlimited questions anytime.</p>
        <a href="https://innocent200509.github.io/Universal-AI-Tutor/" class="btn">Start Learning →</a>
    </div>
    <script>
        // Auto-redirect after 3 seconds
        setTimeout(() => {
            window.location.href = 'https://innocent200509.github.io/Universal-AI-Tutor/';
        }, 3000);
    </script>
</body>
</html>
